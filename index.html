<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nutrition Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B1410;
  --bg2:    #101A13;
  --bg3:    #162019;
  --border: #1D2C20;
  --green:  #4ADE80;
  --green2: #22C55E;
  --blue:   #60A5FA;
  --amber:  #FBBF24;
  --purple: #A78BFA;
  --teal:   #34D399;
  --red:    #F87171;
  --text:   #DFF0E4;
  --muted:  #4E6E57;
  --card:   #121B15;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-left: max(0px, env(safe-area-inset-left));
  padding-right: max(0px, env(safe-area-inset-right));
}

/* ─── UPLOAD ─────────────────────────────────── */
#upload-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse 600px 400px at 50% 40%, #0E2018 0%, var(--bg) 70%);
}

.drop-zone {
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 56px 72px;
  text-align: center;
  background: var(--bg2);
  max-width: 400px;
  width: 90%;
  cursor: pointer;
  transition: border-color .25s, box-shadow .25s;
}

.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--green);
  box-shadow: 0 0 50px rgba(74,222,128,.08);
}

.drop-icon {
  font-size: 44px;
  margin-bottom: 20px;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

.drop-zone h1 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.drop-zone .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 28px;
}

.btn {
  background: var(--green);
  color: #081209;
  border: none;
  padding: 11px 26px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s, transform .15s;
}

.btn:hover { background: #86EFAC; transform: translateY(-1px); }

.drop-hint {
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ─── DASHBOARD ──────────────────────────────── */
#dashboard { display: none; flex-direction: column; min-height: 100vh; }

.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 10;
}

.hdr-left { display: flex; align-items: center; gap: 14px; }

.hdr h1 { font-size: 17px; font-weight: 800; letter-spacing: -.3px; color: var(--green); }

.week-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 3px 11px;
  border-radius: 20px;
}

.hdr-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 16px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: .2s;
}

.hdr-btn:hover { border-color: var(--green); color: var(--green); }

.body { display: flex; flex: 1; }

/* ─── SIDEBAR ────────────────────────────────── */
.sidebar {
  width: 200px;
  min-width: 200px;
  border-right: 1px solid var(--border);
  background: var(--bg2);
  padding: 18px 0;
  overflow-y: auto;
}

.sidebar-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.8px;
  color: var(--muted);
  padding: 0 14px;
  margin-bottom: 10px;
}

/* ─── KW ACCORDION ───────────────────────────── */
.kw-group { margin-bottom: 2px; }

.kw-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .15s, border-color .15s;
  user-select: none;
}

.kw-header:hover { background: var(--bg3); }

.kw-header.current-week {
  border-left-color: var(--green);
  background: rgba(74,222,128,0.05);
}

.kw-header.current-week .kw-label {
  color: var(--green);
}

.kw-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.kw-range {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 2px;
}

.kw-meta { flex: 1; }

.kw-chevron {
  font-size: 10px;
  color: var(--muted);
  transition: transform .2s ease;
  flex-shrink: 0;
  display: inline-block;
  transform-origin: 50% 50%;
  line-height: 1;
}

.kw-group.open .kw-chevron { transform: rotate(180deg); }

.kw-days {
  display: none;
  overflow: hidden;
}

.kw-group.open .kw-days { display: block; }

/* Mobile: KW + Tage in einer horizontalen Scroll-Zeile */
@media (max-width: 767px) {
  .kw-days { display: none !important; }
  #kw-list  { display: none !important; }

  .sidebar {
    flex-direction: column !important;
    width: 100% !important;
    overflow: visible !important;
    padding: 0 !important;
    height: auto !important;
    border-right: none !important;
    border-bottom: 1px solid var(--border) !important;
  }

  .sidebar-lbl { display: none; }

  /* Eine horizontale Scroll-Zeile für KWs + Tage */
  #mobile-kw-bar {
    display: flex !important;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    overflow-x: auto;
    overflow-y: visible;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    white-space: nowrap;
    position: relative;
  }
  #mobile-kw-bar::-webkit-scrollbar { display: none; }

  /* Separator zwischen KW-Gruppe und Tagen */
  .mobile-kw-group {
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .mobile-kw-btn {
    flex-shrink: 0;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    transition: background .15s, border-color .15s, color .15s;
    position: relative;
    z-index: 2;
  }
  .mobile-kw-btn:active { opacity: .7; }
  .mobile-kw-btn.active {
    background: rgba(74,222,128,0.15);
    border-color: var(--green);
    color: var(--green);
  }
  .mobile-kw-btn .mkw-range {
    font-size: 8px;
    color: var(--muted);
    margin-top: 2px;
  }
  .mobile-kw-btn.active .mkw-range { color: rgba(74,222,128,0.5); }

  /* Tage-Container: unsichtbar, 0-Breite, slide nach rechts */
  .mobile-days-container {
    display: inline-flex;
    flex-direction: row;
    gap: 6px;
    flex-shrink: 0;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    transform: translateX(-12px);
    transition:
      max-width .3s cubic-bezier(.4,0,.2,1),
      opacity   .25s ease,
      transform .3s cubic-bezier(.4,0,.2,1);
  }
  .mobile-days-container.open {
    max-width: 800px;   /* groß genug für alle Tage */
    opacity: 1;
    transform: translateX(0);
  }

  .mobile-day-btn {
    flex-shrink: 0;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .mobile-day-btn:active { opacity: .7; }
  .mobile-day-btn.active {
    background: rgba(74,222,128,0.12);
    border-color: var(--green);
  }
  .mobile-day-btn .mdb-date {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
  }
  .mobile-day-btn.active .mdb-date { color: var(--green); }
  .mobile-day-btn .mdb-kcal {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* mobile-day-bar wrapper (nicht mehr gebraucht, leer lassen) */
  #mobile-day-bar { display: none !important; }
}

/* animate open */
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kw-group.open .kw-days { animation: slideDown .15s ease; }

.day-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 14px 7px 22px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: .15s;
}

.day-row:hover  { background: var(--bg3); }
.day-row.active {
  background: var(--bg3);
  border-left-color: var(--green);
}

.day-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 400; }
.day-kcal { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }

/* ─── MAIN ───────────────────────────────────── */
.main {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-width: 860px;
}

/* ─── STAT ROW ───────────────────────────────── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}

.stat-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--muted);
  margin-bottom: 5px;
}

.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 500; }
.stat-unit { font-size: 10px; color: var(--muted); margin-left: 1px; }

.mini-bar-wrap {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.mini-bar { height: 100%; border-radius: 2px; transition: width .5s ease; }

/* ─── SECTION TITLE ──────────────────────────── */
.sec-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ─── MEALS ──────────────────────────────────── */
.meals { display: flex; flex-direction: column; gap: 7px; margin-bottom: 30px; }

.meal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  cursor: pointer;
  transition: border-color .15s;
  user-select: none;
}

.meal-card:hover { border-color: #2D4433; }
.meal-card.open  { border-color: #2D4433; }

.meal-header {
  display: grid;
  grid-template-columns: 110px 64px auto 1fr 18px;
  align-items: center;
  gap: 14px;
}

.m-type   { font-size: 13px; font-weight: 600; }
.m-kcal   { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; color: var(--green); }
.m-macros { display: flex; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
.m-macros b { color: var(--text); font-weight: 400; }

.m-chevron {
  color: var(--muted);
  font-size: 12px;
  transition: transform .2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  transform-origin: center center;
  line-height: 1;
}

.meal-card.open .m-chevron { transform: rotate(180deg); }

.m-detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  line-height: 1.7;
  word-break: break-word;
}

.meal-card.open .m-detail { display: block; }

/* ─── PROGRESS BARS ──────────────────────────── */
.prog-list { display: flex; flex-direction: column; gap: 10px; }

.prog-row {
  display: grid;
  grid-template-columns: 110px 1fr 100px;
  align-items: center;
  gap: 12px;
}

.prog-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

.track { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }

.fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.34,1.56,.64,1); }

.prog-nums { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; white-space: nowrap; }
.prog-nums b { color: var(--text); font-weight: 400; }

/* ─── MICRO GRID ─────────────────────────────── */
.micro-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}

.micro-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 11px 13px;
  border-left: 3px solid var(--border);
}

.micro-card.s-green { border-left-color: var(--green); }
.micro-card.s-amber { border-left-color: var(--amber); }
.micro-card.s-red   { border-left-color: var(--red); }

.mc-name  { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.mc-val   { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; margin-bottom: 1px; }
.mc-empf  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 7px; }

.mc-pct-row { display: flex; align-items: center; gap: 6px; }

.mc-pct-bar {
  flex: 1;
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.mc-pct-fill { height: 100%; border-radius: 2px; }

.mc-pct { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ─── DEFICIT BOX ────────────────────────────── */
.deficit-box {
  background: #130D04;
  border: 1px solid #3A2400;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 24px;
}

.deficit-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--amber);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.deficit-list { display: flex; flex-direction: column; gap: 6px; }

.deficit-item { display: grid; grid-template-columns: 100px 1fr; gap: 10px; align-items: baseline; }

.deficit-nutrient {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--red);
  white-space: nowrap;
}

.deficit-foods { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ─── NOTES ──────────────────────────────────── */
.notes-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 28px; }

.note-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--bg3);
  border-radius: 9px;
  padding: 12px 16px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
}

.note-card.n-total  { border-left-color: var(--green); }
.note-card.n-warn   { border-left-color: var(--amber); }

.note-card strong    { color: var(--green); font-weight: 600; }
.note-card .kritisch { color: var(--red); font-weight: 600; }
.note-card .niedrig  { color: var(--amber); }

/* ─── DIVIDER ────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* ─── ENERGY BALANCE ─────────────────────────── */
.energy-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.energy-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}

.energy-card.deficit { border-color: #3A2400; background: #130D04; }
.energy-card.surplus { border-color: #0D2E1A; background: #0A1F12; }

.energy-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--muted);
  margin-bottom: 5px;
}

.energy-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 500;
}

.energy-val.neg { color: var(--amber); }
.energy-val.pos { color: var(--green); }

.energy-unit { font-size: 10px; color: var(--muted); margin-left: 2px; }

/* Weekly summary bar */
.week-energy-row {
  display: grid;
  grid-template-columns: 110px 1fr 110px;
  align-items: center;
  gap: 12px;
  margin-top: 6px;
}

.week-energy-lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
.week-energy-nums { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; }
.week-energy-nums b { color: var(--text); font-weight: 400; }

.empty-state {
  display: flex; align-items: center; justify-content: center;
  height: 300px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted);
}

/* ─── RESPONSIVE ────────────────────────────────── */

/* Desktop (≥1200px) */
@media (min-width: 1200px) {
  .sidebar { width: 240px; min-width: 240px; }
  .main { padding: 40px 48px; }
  .stat-row { grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .micro-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .meals { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
}

/* Tablet (768px - 1199px) */
@media (min-width: 768px) and (max-width: 1199px) {
  .sidebar { width: 180px; min-width: 180px; }
  .main { padding: 28px 32px; }
  .stat-row { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .micro-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .meals { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .prog-nums { font-size: 10px; }
  .energy-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}

/* Mobile (< 768px) — Stack layout */
@media (max-width: 767px) {
  .body { flex-direction: column; }
  
  .sidebar {
    width: 100%;
    min-width: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 0;
    overflow: visible;
    background: var(--bg2);
  }
  
  /* Akkordion auf Mobile ausblenden */
  .sidebar > div:not(#mobile-day-bar) { display: none; }
  .sidebar-lbl { display: none; }
  
  #mobile-day-bar { display: flex; }
  
  .kw-group { margin-bottom: 0; display: inline-flex; flex-direction: column; flex-shrink: 0; }
  .kw-header { padding: 6px 10px; font-size: 10px; border-left: none; border-bottom: 2px solid transparent; width: 90px; }
  .kw-header.current-week { border-left: none; border-bottom-color: var(--green); }
  .kw-label { font-size: 10px; white-space: nowrap; }
  .kw-range { font-size: 8px; }
  .kw-chevron { display: none; }
  .kw-days { display: none; }
  
  .main { padding: 16px 12px; }
  
  .hdr { padding: 12px 16px; flex-wrap: wrap; }
  .hdr h1 { font-size: 14px; }
  .week-badge { font-size: 9px; }
  
  /* Stats single column */
  .stat-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 12px; }
  .stat-lbl { font-size: 10px; }
  .stat-val { font-size: 16px; }
  .stat-unit { font-size: 10px; }
  
  /* Energy balance vertical stack */
  .energy-row { grid-template-columns: 1fr; gap: 10px; }
  .energy-card { padding: 14px; }
  .energy-lbl { font-size: 10px; }
  .energy-val { font-size: 18px; }
  
  /* Meals vertical */
  .meals { display: flex; flex-direction: column; gap: 10px; }
  .meal-card { padding: 12px; }
  .meal-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .m-type { font-size: 12px; font-weight: 600; }
  .m-kcal { font-size: 14px; font-weight: 600; color: var(--green); }
  .m-macros { gap: 6px; font-size: 9px; }
  .m-macros span { display: block; }

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const GOALS = { kcal: 2200, protein: 110, fat: 75, carbs: 280, fiber: 30 };

const COLORS = {
  kcal: '#4ADE80', protein: '#60A5FA', fat: '#FBBF24', carbs: '#A78BFA', fiber: '#34D399'
};

const FOOD_SOURCES = {
  'Vitamin C':    'Paprika, Rotkohl, Petersilie, Brokkoli, Zitrusfrüchte',
  'Vitamin D':    'Supplement unverzichtbar — keine ausreichende vegane Quelle',
  'Vitamin B12':  'Supplement unverzichtbar — keine natürliche vegane Quelle',
  'Vitamin E':    'Walnüsse, Sonnenblumenkerne, Mandeln, Olivenöl, Avocado',
  'Vitamin A':    'Möhren, Süßkartoffel, Kürbis (als Beta-Carotin)',
  'Vitamin K2':   'Supplement empfohlen — Natto (fermentierte Soja)',
  'Vitamin B2':   'Haferflocken, Mandeln, Sojaprodukte, Pilze',
  'Folat':        'Hülsenfrüchte, Spinat, Spargel, Rote Beete, Edamame',
  'Eisen':        'Hülsenfrüchte, Haferflocken, Kürbiskerne, Sesam/Tahini',
  'Calcium':      'Sesam/Tahini, Sojaprodukte (Tofu, Edamame), Mandeln, Brokkoli',
  'Magnesium':    'Kürbiskerne, Walnüsse, Haferflocken, Hülsenfrüchte, Spinat',
  'Zink':         'Hülsenfrüchte, Kürbiskerne, Quinoa, Hanfsamen',
  'Jod':          'Jodsalz oder Supplement — Algen (Vorsicht: Überdosierung)',
  'Selen':        '2–3 Paranüsse = Tagesdosis (nicht mehr!)',
  'Kalium':       'Banane, Süßkartoffel, Hülsenfrüchte, Spinat, Avocado',
  'Omega-3 ALA':  'Leinsamen, Chiasamen, Walnüsse, Hanfsamen',
  'Beta-Carotin': 'Möhren, Kürbis, Süßkartoffel, Mango, Paprika',
  'Ballaststoffe':'Hülsenfrüchte, Vollkornprodukte, Gemüse, Leinsamen'
};

// ─── HELPERS ──────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function int(s) { return parseInt((s || '').replace(/[^\d]/g, '')) || 0; }
function num(s) { return parseFloat((s || '').replace(/[^\d.]/g, '')) || 0; }

// AW-Gesamtenergie: MD-Eintrag hat Vorrang, sonst AW_FALLBACK
function getAW(date) {
  // MD-Eintrag hat Vorrang
  if (data.energy && data.energy[date]) {
    const b = data.energy[date].burned;
    if (b > 0) return b;
  }
  // Fallback hardcoded
  return AW_FALLBACK[date] || null;
}
function parsePct(s) {
  const m = (s || '').match(/(\d+)/);
  return m ? Math.min(parseInt(m[1]), 100) : 0;
}
function statusClass(status) {
  if ((status || '').includes('🟢')) return 's-green';
  if ((status || '').includes('🟡')) return 's-amber';
  if ((status || '').includes('🔴')) return 's-red';
  return '';
}
function statusColor(status) {
  if ((status || '').includes('🟢')) return 'var(--green)';
  if ((status || '').includes('🟡')) return 'var(--amber)';
  return 'var(--red)';
}
// Balkenfarbe direkt auf Prozentwert — unabhängig vom Status-Emoji
function barColor(pctN) {
  if (pctN >= 90) return 'var(--green)';
  if (pctN >= 50) return 'var(--amber)';
  return 'var(--red)';
}
function fmtNote(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/kritisch:/gi, '<span class="kritisch">Kritisch:</span>')
    .replace(/(strukturell (?:zu )?niedrig)/gi, '<span class="niedrig">$1</span>');
}
function toggleMeal(el) { el.classList.toggle('open'); }

// ─── KW HELPERS ───────────────────────────────────────────────
// Parse "DD.MM." string → Date object (use current year)
function parseDate(ddmm) {
  const parts = ddmm.replace(/\.$/, '').split('.');
  const dd = parseInt(parts[0]), mm = parseInt(parts[1]);
  const year = new Date().getFullYear();
  // Handle year wrap (Dec dates when current month is Jan)
  const d = new Date(year, mm - 1, dd);
  return d;
}

// ISO week number for a Date
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ISO week number of today
function currentIsoWeek() {
  return isoWeek(new Date());
}

// Format Date as "DD.MM."
function fmtShort(date) {
  return pad(date.getDate()) + '.' + pad(date.getMonth() + 1) + '.';
}

// Monday and Sunday of an ISO week
function weekBounds(isoWkNum, year) {
  // Find a Thursday in that week (ISO weeks start Mon)
  const simple = new Date(year, 0, 1 + (isoWkNum - 1) * 7);
  const dow = simple.getDay();
  const isoWeekStart = new Date(simple);
  isoWeekStart.setDate(simple.getDate() - (dow <= 4 ? dow - 1 : dow - 8));
  const isoWeekEnd = new Date(isoWeekStart);
  isoWeekEnd.setDate(isoWeekStart.getDate() + 6);
  return { mon: isoWeekStart, sun: isoWeekEnd };
}

// Group sorted date strings by ISO week → Map<kwNum, string[]>
function groupByKW(sortedDates) {
  const map = new Map(); // key: "YYYY-WW"
  for (const d of sortedDates) {
    const date = parseDate(d);
    const kw   = isoWeek(date);
    const yr   = date.getFullYear();
    const key  = yr + '-' + pad(kw);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(d);
  }
  return map;
}

// Header badge: Mo DD.MM. – So DD.MM. for a week group
function weekRangeLabel(dates) {
  const parsed = dates.map(d => parseDate(d));
  parsed.sort((a, b) => a - b);
  const mon = parsed[0], sun = parsed[parsed.length - 1];
  return 'Mo ' + fmtShort(mon) + ' – So ' + fmtShort(sun);
}

// ─── PARSER ───────────────────────────────────────────────────

/**
 * Parse nutrition.json into dashboard format
 */
function parseJSON(jsonText) {
  const raw = JSON.parse(jsonText);
  const days = {};
  const totals = {};
  const micros = {};
  const notes = [];
  const energy = {};
  let week = '';

  // Iterate through weeks → days → meals
  raw.weeks.forEach(w => {
    week = 'KW ' + w.week + ' — ' + w.start_date + ' bis ' + w.end_date;
    
    w.days.forEach(day => {
      const dateStr = day.date; // "2026-05-29"
      const dateKey = dateStr.slice(8, 10) + '.' + dateStr.slice(5, 7) + '.'; // "29.05."
      
      // Meals array
      const dayMeals = [];
      if (day.meals && Array.isArray(day.meals)) {
        day.meals.forEach(m => {
          dayMeals.push({
            date: dateKey,
            meal: m.meal_type.charAt(0).toUpperCase() + m.meal_type.slice(1),
            kcal: m.kcal,
            protein: m.macros.protein_g,
            fat: m.macros.fat_g,
            carbs: m.macros.carbs_g,
            fiber: m.macros.fiber_g,
            notes: m.foods ? m.foods.join(', ') : ''
          });
        });
      }
      (days[dateKey] = days[dateKey] || []).push(...dayMeals);
      
      // Daily totals
      if (day.daily_summary) {
        totals[dateKey] = {
          kcal: day.daily_summary.kcal,
          protein: day.daily_summary.macros.protein_g,
          fat: day.daily_summary.macros.fat_g,
          carbs: day.daily_summary.macros.carbs_g,
          fiber: day.daily_summary.macros.fiber_g
        };
      }
      
      // Energy balance (Apple Watch)
      if (day.energy_balance) {
        const eaten = day.energy_balance.consumed_kcal;
        const burned = day.energy_balance.burned_apple_watch_kcal;
        if (burned > 0) {
          energy[dateKey] = { eaten, burned };
        }
      }
      
      // Micronutrients
      if (day.micronutrients && day.micronutrient_status) {
        const micro = {};
        Object.entries(day.micronutrients).forEach(([key, val]) => {
          const humanKey = key
            .replace(/_/g, ' ')
            .split(' ')
            .map(w => w.charAt(0).toUpperCase() + w.slice(1))
            .join(' ');
          const status = day.micronutrient_status[key] || '—';
          
          // Find target value
          let empf = '—';
          if (raw.micronutrient_targets && raw.micronutrient_targets[key]) {
            empf = raw.micronutrient_targets[key].daily_target;
          }
          
          const pct = empf !== '—' ? Math.round(val / empf * 100) + '%' : '—';
          micro[humanKey] = {
            gesamt: val,
            empf: empf,
            pct: pct,
            status: status
          };
        });
        micros[dateKey] = micro;
      }
      
      // Notes
      if (day.notes) {
        notes.push({
          text: day.notes,
          date: dateKey,
          type: ''
        });
      }
    });
  });

  return { days, totals, micros, notes, week, energy };
}

/**
 * LEGACY: Parse nutrition.md (fallback if user has old file)
 */
function parseMD(text) {
  const lines = text.split('\n');
  const meals    = [];
  const totals   = {};
  const micros   = {};
  const notes    = [];
  const energy   = {};  // { 'DD.MM.': { eaten, burned } }
  let week       = '';
  let ctx        = null;
  let totalDate  = null;
  let microDate  = null;
  let skipNext   = false;

  for (const raw of lines) {
    const t = raw.trim();

    if (/^##\s*(Woche|KW)/.test(t)) {
      week = t.replace(/^#+\s*/, '');
      continue;
    }

    if (/^###\s*Makronährstoffe/.test(t)) {
      ctx = 'macros'; skipNext = true; continue;
    }
    if (/^###\s*Tagessumme/.test(t)) {
      ctx = 'total';
      const m = t.match(/(\d{1,2})\.(\d{1,2})/);
      totalDate = m ? pad(m[1]) + '.' + pad(m[2]) + '.' : null;
      skipNext = true; continue;
    }
    if (/^###\s*Mikronährstoffe/.test(t)) {
      ctx = 'micro';
      const m = t.match(/(\d{1,2})\.(\d{1,2})/);
      microDate = m ? pad(m[1]) + '.' + pad(m[2]) + '.' : null;
      skipNext = true; continue;
    }
    if (/^##\s*Analyse-Notizen/.test(t)) {
      ctx = 'notes'; continue;
    }
    if (/Energiebilanz/.test(t) && t.startsWith('|') === false) {
      ctx = 'energy'; skipNext = true; continue;
    }
    if (/^###/.test(t) || (/^##/.test(t) && !/Woche|KW|Analyse/.test(t))) {
      ctx = null; continue;
    }
    if (/^####/.test(t) && /Energiebilanz/.test(t)) {
      ctx = 'energy'; skipNext = true; continue;
    }

    if (ctx === 'notes' && t.startsWith('-')) {
      const dm = t.match(/(\d{1,2})\.(\d{1,2})/);
      const date = dm ? pad(dm[1]) + '.' + pad(dm[2]) + '.' : null;
      const type = /kritisch|strukturell|niedrig|fehlt/i.test(t) ? 'n-warn' : 'n-total';
      notes.push({ text: t.replace(/^-\s*/, ''), date, type });
      continue;
    }

    // ── Append-only Kommentar-Annotationen (nutrition_append.py)
    // <!-- AW:DD.MM. --> gefolgt von Tabelleneintrag → nächste Zeile ist AW-Daten
    if (/^<!--\s*AW:(\d{1,2}\.\d{1,2}\.)\s*-->/.test(t)) {
      ctx = 'energy_comment';
      skipNext = false;
      continue;
    }
    if (ctx === 'energy_comment' && t.startsWith('|')) {
      const cells2 = t.split('|').slice(1, -1).map(c => c.trim());
      if (cells2.length >= 2) {
        const dm = cells2[0].match(/(\d{1,2})\.(\d{1,2})/);
        if (dm) {
          const date   = pad(dm[1]) + '.' + pad(dm[2]) + '.';
          // Nicht überschreiben wenn Haupttabelle explizit — gesetzt hat
          if (!energy[date] || !energy[date].explicit_none) {
            const burned = int(cells2[2]);
            if (burned > 0) energy[date] = { eaten: int(cells2[1]), burned };
          }
        }
      }
      ctx = null; continue;
    }

    if (!t.startsWith('|')) continue;
    if (/^\|[\s\-|:]+$/.test(t)) continue;
    if (skipNext) { skipNext = false; continue; }

    const cells = t.split('|').slice(1, -1).map(c => c.trim());

    if (ctx === 'macros' && cells.length >= 6) {
      const dm = cells[0].match(/(\d{1,2})\.(\d{1,2})/);
      if (!dm) continue;
      const date = pad(dm[1]) + '.' + pad(dm[2]) + '.';
      const kcal = int(cells[2]);
      if (!kcal) continue;
      meals.push({
        date, meal: cells[1], kcal,
        protein: num(cells[3]), fat: num(cells[4]),
        carbs:   num(cells[5]), fiber: num(cells[6]) || 0,
        notes:   cells[7] || ''
      });
    }

    if (ctx === 'total' && totalDate && cells.length >= 4) {
      const kcal = int(cells[0]);
      if (kcal > 100) {
        totals[totalDate] = {
          kcal, protein: num(cells[1]),
          fat: num(cells[2]), carbs: num(cells[3]), fiber: num(cells[4]) || 0
        };
      }
    }

    if (ctx === 'micro' && microDate && cells.length >= 5 && cells[0] !== 'Nährstoff') {
      const len = cells.length;
      if (!micros[microDate]) micros[microDate] = {};
      micros[microDate][cells[0]] = {
        gesamt: cells[len - 4],
        empf:   cells[len - 3],
        pct:    cells[len - 2],
        status: cells[len - 1]
      };
    }

    // Energiebilanz: | Datum | Gegessen | Verbraucht (AW) | Bilanz |
    if (ctx === 'energy' && cells.length >= 3) {
      const dm = cells[0].match(/(\d{1,2})\.(\d{1,2})/);
      if (!dm) continue;
      const date      = pad(dm[1]) + '.' + pad(dm[2]) + '.';
      const rawBurned = cells[2].replace(/\s/g, '');
      if (rawBurned === '—' || rawBurned === '-' || rawBurned === '') {
        // Explizit kein Wert — sperrt spätere Kommentarblöcke
        energy[date] = { eaten: 0, burned: 0, explicit_none: true };
      } else {
        const burned = int(rawBurned);
        if (burned > 0) energy[date] = { eaten: int(cells[1]), burned };
      }
    }

  }

  const days = {};
  for (const m of meals) {
    (days[m.date] = days[m.date] || []).push(m);
  }

  return { days, totals, micros, notes, week, energy };
}

// ─── STATE ────────────────────────────────────────────────────
let data        = null;
let activeDate  = null;
let openKWs     = new Set();

// AW-Gesamtenergie: ausschließlich aus nutrition.md (Energiebilanz-Sektion)
function getAW(date) {
  if (data && data.energy && data.energy[date]) {
    const b = data.energy[date].burned;
    if (b > 0) return b;
  }
  return null;
}

// ─── RENDER SIDEBAR ───────────────────────────────────────────
// Tracks which KW is expanded on mobile
let mobileOpenKW = null;

function renderSidebar() {
  const list     = document.getElementById('kw-list');
  const kwBar    = document.getElementById('mobile-kw-bar');
  const dayBar   = document.getElementById('mobile-day-bar');
  list.innerHTML   = '';
  kwBar.innerHTML  = '';
  dayBar.innerHTML = '';

  const sortedDates = Object.keys(data.days).sort();
  const kwMap = groupByKW(sortedDates);
  const curKW = currentIsoWeek();
  const curYr = new Date().getFullYear();
  const curKey = curYr + '-' + pad(curKW);
  
  const isMobile = window.innerWidth < 768;

  // ── Mobile: KW-Kachel + Tage direkt daneben in einer Zeile
  if (isMobile) {
    // Auto-open KW of active date if none set
    if (!mobileOpenKW) {
      const d = parseDate(activeDate);
      const kw = isoWeek(d);
      const yr = d.getFullYear();
      mobileOpenKW = yr + '-' + pad(kw);
    }

    for (const [kwKey, dates] of kwMap) {
      const [, wn] = kwKey.split('-');
      const kwNum = parseInt(wn);
      const datesInGroup = dates.slice().sort();
      const parsedDates = datesInGroup.map(d => parseDate(d)).sort((a, b) => a - b);
      const rangeStr = fmtShort(parsedDates[0]) + ' – ' + fmtShort(parsedDates[parsedDates.length - 1]);
      const isActive = kwKey === mobileOpenKW;

      // KW-Gruppe: KW-Button + Tage-Container nebeneinander
      const group = document.createElement('div');
      group.className = 'mobile-kw-group';
      group.dataset.kwkey = kwKey;

      const btn = document.createElement('button');
      btn.className = 'mobile-kw-btn' + (isActive ? ' active' : '');
      btn.innerHTML = `<span>KW ${kwNum}</span><span class="mkw-range">${rangeStr}</span>`;
      btn.onclick = () => toggleMobileKW(kwKey);

      const daysContainer = document.createElement('div');
      daysContainer.className = 'mobile-days-container' + (isActive ? ' open' : '');

      datesInGroup.forEach(d => {
        const kcal = data.days[d].reduce((s, m) => s + m.kcal, 0);
        const dayBtn = document.createElement('button');
        dayBtn.className = 'mobile-day-btn' + (d === activeDate ? ' active' : '');
        dayBtn.innerHTML = `<span class="mdb-date">${d}</span><span class="mdb-kcal">${kcal} kcal</span>`;
        dayBtn.onclick = () => selectDay(d);
        daysContainer.appendChild(dayBtn);
      });

      group.appendChild(btn);
      group.appendChild(daysContainer);
      kwBar.appendChild(group);
    }

    // Scroll aktive KW in Sicht
    const activeKwBtn = kwBar.querySelector('.mobile-kw-btn.active');
    if (activeKwBtn) setTimeout(() => activeKwBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 50);
    return;
  }

  // ── Desktop: Akkordion
  for (const [kwKey, dates] of kwMap) {
    const [yr, wn] = kwKey.split('-');
    const kwNum = parseInt(wn);
    const isCurrent = kwKey === curKey;
    const isOpen = openKWs.has(kwKey);

    const datesInGroup = dates.slice().sort();
    const parsedDates  = datesInGroup.map(d => parseDate(d)).sort((a, b) => a - b);
    const rangeStr     = fmtShort(parsedDates[0]) + ' – ' + fmtShort(parsedDates[parsedDates.length - 1]);

    const group = document.createElement('div');
    group.className = 'kw-group' + (isOpen ? ' open' : '');
    group.dataset.kwkey = kwKey;

    const hdr = document.createElement('div');
    hdr.className = 'kw-header' + (isCurrent ? ' current-week' : '');
    hdr.innerHTML = `
      <div class="kw-meta">
        <div class="kw-label">KW ${kwNum}</div>
        <div class="kw-range">${rangeStr}</div>
      </div>
      <div class="kw-chevron">▾</div>`;
    hdr.onclick = () => toggleKW(kwKey);

    const daysEl = document.createElement('div');
    daysEl.className = 'kw-days';

    for (const d of datesInGroup) {
      const kcal = data.days[d].reduce((s, m) => s + m.kcal, 0);
      const row  = document.createElement('div');
      row.className = 'day-row' + (d === activeDate ? ' active' : '');
      row.innerHTML = `<span class="day-date">${d}</span><span class="day-kcal">${kcal}</span>`;
      row.onclick = () => selectDay(d);
      daysEl.appendChild(row);
    }

    group.appendChild(hdr);
    group.appendChild(daysEl);
    list.appendChild(group);
  }
}

function toggleMobileKW(kwKey) {
  const isMobile = window.innerWidth < 768;
  if (!isMobile) return;

  // Alle Gruppen durchgehen und per data-kwkey matchen
  const groups = document.querySelectorAll('.mobile-kw-group');
  groups.forEach(group => {
    const btn = group.querySelector('.mobile-kw-btn');
    const container = group.querySelector('.mobile-days-container');
    if (!btn || !container) return;
    const thisKey = group.dataset.kwkey;
    
    if (thisKey === kwKey) {
      const isNowOpen = container.classList.contains('open');
      if (isNowOpen) {
        // Schließen
        container.classList.remove('open');
        btn.classList.remove('active');
        mobileOpenKW = null;
      } else {
        // Öffnen
        container.classList.add('open');
        btn.classList.add('active');
        mobileOpenKW = kwKey;
      }
    } else {
      // Andere schließen
      container.classList.remove('open');
      btn.classList.remove('active');
    }
  });
}

function toggleKW(kwKey) {
  if (openKWs.has(kwKey)) {
    openKWs.delete(kwKey);
  } else {
    openKWs.add(kwKey);
  }
  renderSidebar();
}

function selectDay(date) {
  activeDate = date;
  // Ensure the KW containing this date is open
  const d    = parseDate(date);
  const kw   = isoWeek(d);
  const yr   = d.getFullYear();
  const key  = yr + '-' + pad(kw);
  openKWs.add(key);
  renderSidebar();
  updateHeaderBadge();
  renderMain();
}

// ─── HEADER BADGE ─────────────────────────────────────────────
function updateHeaderBadge() {
  // Show range for the week of the active date; fallback to current KW
  const badge = document.getElementById('week-badge');
  if (!activeDate) { badge.textContent = data.week || '—'; return; }

  const d   = parseDate(activeDate);
  const kw  = isoWeek(d);
  const yr  = d.getFullYear();
  const key = yr + '-' + pad(kw);

  // Collect all dates in same week
  const sortedDates = Object.keys(data.days).sort();
  const kwMap = groupByKW(sortedDates);
  const datesInWeek = kwMap.get(key) || [activeDate];
  const parsed = datesInWeek.map(x => parseDate(x)).sort((a, b) => a - b);

  const monStr = 'Mo ' + fmtShort(parsed[0]);
  const sunStr = 'So ' + fmtShort(parsed[parsed.length - 1]);
  badge.textContent = `KW ${kw} · ${monStr} – ${sunStr}`;
}

// ─── RENDER MAIN ──────────────────────────────────────────────
function renderMain() {
  const main = document.getElementById('main');

  if (!activeDate || !data.days[activeDate]) {
    main.innerHTML = '<div class="empty-state">Tag auswählen →</div>';
    return;
  }

  const meals = data.days[activeDate];

  const sum = {
    kcal:    meals.reduce((s, m) => s + m.kcal,    0),
    protein: meals.reduce((s, m) => s + m.protein, 0),
    fat:     meals.reduce((s, m) => s + m.fat,     0),
    carbs:   meals.reduce((s, m) => s + m.carbs,   0),
    fiber:   meals.reduce((s, m) => s + m.fiber,   0)
  };
  const tot = data.totals[activeDate] || sum;

  const STATS = [
    { key: 'kcal',    label: 'kcal',    unit: 'kcal' },
    { key: 'protein', label: 'Protein', unit: 'g'    },
    { key: 'fat',     label: 'Fett',    unit: 'g'    },
    { key: 'carbs',   label: 'KH',      unit: 'g'    },
    { key: 'fiber',   label: 'Bst.',    unit: 'g'    }
  ];

  const awBurned = getAW(activeDate);
  const kcalGoal = awBurned || GOALS.kcal;

  const statHTML = `<div class="stat-row">` +
    STATS.map(s => {
      const val  = tot[s.key];
      const goal = s.key === 'kcal' ? kcalGoal : GOALS[s.key];
      const p    = Math.min(Math.round(val / goal * 100), 100);
      const isKcal = s.key === 'kcal';
      const subLabel = isKcal && awBurned
        ? `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px">/ ${awBurned} kcal ↑</div>`
        : '';
      return `
        <div class="stat-card">
          <div class="stat-lbl">${s.label}</div>
          <div class="stat-val">${val}<span class="stat-unit">${s.unit}</span></div>
          ${subLabel}
          <div class="mini-bar-wrap">
            <div class="mini-bar" style="width:${p}%;background:${COLORS[s.key]}"></div>
          </div>
        </div>`;
    }).join('') + `</div>`;

  // ── Energy balance (Apple Watch)
  let energyHTML = '';
  const burned = getAW(activeDate);
  if (burned) {
    const eaten  = tot.kcal;
    const diff   = eaten - burned;
    const isDeficit = diff < 0;
    const diffLabel = isDeficit ? diff : '+' + diff;
    const diffClass = isDeficit ? 'neg' : 'pos';
    const cardClass = isDeficit ? 'deficit' : 'surplus';
    energyHTML = `
      <hr class="divider">
      <div class="sec-title">Energiebilanz · Apple Watch</div>
      <div class="energy-row">
        <div class="energy-card">
          <div class="energy-lbl">Gegessen</div>
          <div class="energy-val">${eaten}<span class="energy-unit">kcal</span></div>
        </div>
        <div class="energy-card">
          <div class="energy-lbl">Verbraucht · Apple Watch</div>
          <div class="energy-val">${burned}<span class="energy-unit">kcal</span></div>
        </div>
        <div class="energy-card ${cardClass}">
          <div class="energy-lbl">Bilanz</div>
          <div class="energy-val ${diffClass}">${diffLabel}<span class="energy-unit">kcal</span></div>
        </div>
      </div>`;
  }

  const mealHTML = `
    <div class="sec-title">Mahlzeiten</div>
    <div class="meals">` +
    meals.map(m => `
      <div class="meal-card" onclick="toggleMeal(this)">
        <div class="meal-header">
          <div class="m-type">${m.meal}</div>
          <div class="m-kcal">${m.kcal}</div>
          <div class="m-macros">
            <span>P <b>${m.protein}g</b></span>
            <span>F <b>${m.fat}g</b></span>
            <span>KH <b>${m.carbs}g</b></span>
            <span>Bst <b>${m.fiber}g</b></span>
          </div>
          <div></div>
          <div class="m-chevron">▾</div>
        </div>
        <div class="m-detail">${m.notes || '— keine Notizen —'}</div>
      </div>`
    ).join('') + `</div>`;

  const progHTML = `
    <hr class="divider">
    <div class="sec-title">Tagesziele</div>
    <div class="prog-list">` +
    STATS.map(s => {
      const val  = tot[s.key];
      const goal = s.key === 'kcal' ? kcalGoal : GOALS[s.key];
      const p    = Math.min(Math.round(val / goal * 100), 100);
      const over = val > goal * 1.05;
      const goalLabel = s.key === 'kcal' && awBurned ? `${goal} kcal` : `${goal}${s.unit}`;
      return `
        <div class="prog-row">
          <div class="prog-name">${s.label}</div>
          <div class="track">
            <div class="fill" style="width:${p}%;background:${over ? 'var(--red)' : COLORS[s.key]}"></div>
          </div>
          <div class="prog-nums"><b>${val}${s.unit}</b> / ${goalLabel}</div>
        </div>`;
    }).join('') + `</div>`;

  let microHTML = '';
  const micro = data.micros[activeDate];
  if (micro && Object.keys(micro).length > 0) {
    const STATUS_ORDER = ['🔴', '🟡', '🟢'];
    const entries = Object.entries(micro).sort((a, b) => {
      const ia = STATUS_ORDER.findIndex(e => (a[1].status || '').includes(e));
      const ib = STATUS_ORDER.findIndex(e => (b[1].status || '').includes(e));
      return (ia < 0 ? 9 : ia) - (ib < 0 ? 9 : ib);
    });

    microHTML = `
      <hr class="divider">
      <div class="sec-title">Mikronährstoffe</div>
      <div class="micro-grid">` +
      entries.map(([name, m]) => {
        const cls   = statusClass(m.status);
        const pctN  = parsePct(m.pct);
        const color = barColor(pctN);
        return `
          <div class="micro-card ${cls}">
            <div class="mc-name">${name}</div>
            <div class="mc-val">${m.gesamt || '—'}</div>
            <div class="mc-empf">/ ${m.empf || '—'}</div>
            <div class="mc-pct-row">
              <div class="mc-pct-bar">
                <div class="mc-pct-fill" style="width:${pctN}%;background:${color}"></div>
              </div>
              <div class="mc-pct">${m.pct || '—'}</div>
            </div>
          </div>`;
      }).join('') + `</div>`;

    const deficits = entries.filter(([, m]) => (m.status || '').includes('🔴'));
    if (deficits.length > 0) {
      microHTML += `
        <div class="deficit-box">
          <div class="deficit-title">↑ Defizite — morgen ausgleichen</div>
          <div class="deficit-list">` +
          deficits.map(([name]) => {
            const src = FOOD_SOURCES[name] || 'Supplement prüfen';
            return `
              <div class="deficit-item">
                <span class="deficit-nutrient">🔴 ${name}</span>
                <span class="deficit-foods">${src}</span>
              </div>`;
          }).join('') +
          `</div>
        </div>`;
    }
  }

  let notesHTML = '';
  const dayNotes = data.notes.filter(n =>
    !n.date || n.date === activeDate ||
    n.text.includes(activeDate.replace(/\.$/, ''))
  );
  if (dayNotes.length > 0) {
    notesHTML = `
      <hr class="divider">
      <div class="sec-title">Analyse</div>
      <div class="notes-list">` +
      dayNotes.map(n => `
        <div class="note-card ${n.type || ''}">
          ${fmtNote(n.text)}
        </div>`
      ).join('') +
      `</div>`;
  }

  // ── Weekly energy summary (all days in same KW that have AW data)
  let weekEnergyHTML = '';
  const activeParsed = parseDate(activeDate);
  const activeKW     = isoWeek(activeParsed);
  const activeYr     = activeParsed.getFullYear();
  const activeKWKey  = activeYr + '-' + pad(activeKW);
  const sortedAll    = Object.keys(data.days).sort();
  const kwMap2       = groupByKW(sortedAll);
  const kwDates      = kwMap2.get(activeKWKey) || [];
  const awDaysInKW   = kwDates.filter(d => getAW(d) !== null);

  if (awDaysInKW.length > 0) {
    const totalEaten  = awDaysInKW.reduce((s, d) => {
      const t = data.totals[d] || { kcal: data.days[d].reduce((a,m)=>a+m.kcal,0) };
      return s + t.kcal;
    }, 0);
    const totalBurned = awDaysInKW.reduce((s, d) => s + getAW(d), 0);
    const totalDiff   = totalEaten - totalBurned;
    const avgEaten    = Math.round(totalEaten  / awDaysInKW.length);
    const avgBurned   = Math.round(totalBurned / awDaysInKW.length);
    const avgDiff     = Math.round(totalDiff   / awDaysInKW.length);
    const diffSign    = totalDiff >= 0 ? '+' : '';
    const avgSign     = avgDiff   >= 0 ? '+' : '';
    const diffColor   = totalDiff < 0 ? 'var(--amber)' : 'var(--green)';

    weekEnergyHTML = `
      <hr class="divider">
      <div class="sec-title">Wochenbilanz KW ${activeKW} · ${awDaysInKW.length} Tag${awDaysInKW.length > 1 ? 'e' : ''} mit Watch-Daten</div>
      <div class="energy-row">
        <div class="energy-card">
          <div class="energy-lbl">Ø Gegessen</div>
          <div class="energy-val">${avgEaten}<span class="energy-unit">kcal</span></div>
        </div>
        <div class="energy-card">
          <div class="energy-lbl">Ø Verbraucht · Apple Watch</div>
          <div class="energy-val">${avgBurned}<span class="energy-unit">kcal</span></div>
        </div>
        <div class="energy-card ${totalDiff < 0 ? 'deficit' : 'surplus'}">
          <div class="energy-lbl">Ø Bilanz / Tag</div>
          <div class="energy-val" style="color:${diffColor}">${avgSign}${avgDiff}<span class="energy-unit">kcal</span></div>
        </div>
      </div>
      <div class="week-energy-row">
        <div class="week-energy-lbl">Gesamt ${awDaysInKW.length}d</div>
        <div class="track" style="height:5px">
          <div class="fill" style="width:${Math.min(Math.abs(totalDiff)/50,100)}%;background:${diffColor}"></div>
        </div>
        <div class="week-energy-nums"><b style="color:${diffColor}">${diffSign}${totalDiff} kcal</b></div>
      </div>`;
  }

  main.innerHTML = statHTML + energyHTML + mealHTML + progHTML + microHTML + weekEnergyHTML + notesHTML;
}

// ─── FILE LOADING ─────────────────────────────────────────────
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const content = e.target.result;
      
      // Auto-detect JSON vs MD
      let parsedData;
      if (file.name.endsWith('.json') || content.trim().startsWith('{')) {
        // JSON format
        parsedData = parseJSON(content);
      } else {
        // MD format (default)
        parsedData = parseMD(content);
      }
      
      data = parsedData;
      const dates = Object.keys(data.days).sort();
      if (!dates.length) {
        alert('Keine Mahlzeiten gefunden. nutrition.json oder nutrition.md prüfen.');
        return;
      }
      document.getElementById('upload-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      document.getElementById('dashboard').style.flexDirection = 'column';

      // Select most recent day
      activeDate = dates[dates.length - 1];

      // Auto-open the KW of the most recent day
      const d   = parseDate(activeDate);
      const kw  = isoWeek(d);
      const yr  = d.getFullYear();
      openKWs.add(yr + '-' + pad(kw));

      renderSidebar();
      updateHeaderBadge();
      renderMain();
    } catch(err) {
      alert('Fehler: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// ─── EVENTS ───────────────────────────────────────────────────
const fileInput = document.getElementById('file-input');

document.getElementById('open-btn').onclick   = () => fileInput.click();
document.getElementById('reload-btn').onclick = () => fileInput.click();
fileInput.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

const dz = document.getElementById('drop-zone');
dz.ondragover  = e => { e.preventDefault(); dz.classList.add('dragover'); };
dz.ondragleave = ()  => dz.classList.remove('dragover');
dz.ondrop      = e  => {
  e.preventDefault();
  dz.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
};

// ─── RESPONSIVE BEHAVIOR ──────────────────────────────────────
let lastViewportWidth = window.innerWidth;

window.addEventListener('resize', () => {
  const currentWidth = window.innerWidth;
  // Only re-render if crossing 768px breakpoint (mobile/desktop)
  if ((lastViewportWidth < 768 && currentWidth >= 768) || 
      (lastViewportWidth >= 768 && currentWidth < 768)) {
    lastViewportWidth = currentWidth;
    if (data && activeDate) {
      renderMain();
    }
  }
  lastViewportWidth = currentWidth;
});

// Touch-friendly: Prevent text selection in interactive areas
document.querySelectorAll('.kw-header, .day-row, .meal-card, .hdr-btn').forEach(el => {
  el.addEventListener('touchstart', () => {
    el.style.userSelect = 'none';
  });
});
</script>
